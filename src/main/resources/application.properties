# Datasource
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:auth_user}
quarkus.datasource.password=${DB_PASSWORD:auth_pass}
quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:edutrack}

# Hibernate ORM DDL gestionado exclusivamente por Flyway
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.database.default-schema=auth

# Flyway
quarkus.flyway.migrate-at-start=true
quarkus.flyway.schemas=auth
quarkus.flyway.locations=classpath:db/migration

# Dev valida que el mapeo JPA coincide exactamente con el DDL de Flyway
%dev.quarkus.hibernate-orm.database.generation=validate
%dev.quarkus.hibernate-orm.log.sql=true

# Test: Flyway crea el schema, Hibernate solo valida
%test.quarkus.hibernate-orm.database.generation=none
%test.quarkus.flyway.migrate-at-start=true

# JWT - RS256
# Las llaves NO viven en el classpath: residen en .certs/ (raiz del servicio,
# gitignored) y su ubicacion se inyecta por env var. El default apunta a .certs/
# para dev local (CWD = auth/); en Docker se pisa con la ruta del volumen montado
# (JWT_PRIVATE_KEY_LOCATION / JWT_PUBLIC_KEY_LOCATION) y en Fly.io con un secret.
smallrye.jwt.sign.key.location=${JWT_PRIVATE_KEY_LOCATION:.certs/privateKey.pem}
smallrye.jwt.new-token.key-id=edutrack-auth-key-1
mp.jwt.verify.publickey.location=${JWT_PUBLIC_KEY_LOCATION:.certs/publicKey.pem}
mp.jwt.issuer=edutrack-auth

# Auth proactiva deshabilitada: los endpoints no requieren JWT por defecto
quarkus.http.auth.proactive=false

# Interpretacion de cabeceras internas propagadas por el Gateway (RequestHeaders).
# EAGER: header presente pero malformado => 400 Bad Request.
# WARN : header presente pero malformado => se loguea WARN y se trata como ausente.
edutrack.headers.validation.mode=EAGER

# Exposicion de stack trace en el body de errores (GlobalExceptionMappers).
# false (default): traza fuera del body — recomendado en prod.
# true            : incluye hasta 25 frames en ErrorResponse.trace — util en dev/staging.
edutrack.errors.expose-stacktrace=false

# OpenAPI / Swagger UI
# El documento OpenAPI se sirve en /auth/q/openapi (?format=json|yaml).
# La metadata global (info, tags, security schemes) vive como anotaciones en
# AuthApplication; aqui solo se ajusta exposicion y servidor.
# always-include => Swagger UI tambien disponible empaquetado en prod (no solo dev),
# util porque tras el Gateway no hay otra forma de explorar el contrato del MS.
quarkus.smallrye-openapi.always-include-in-prod=true
# El esquema de seguridad lo declaramos explicito en AuthApplication (bearerAuth);
# se desactiva el auto-generado por el escaneo JWT para no duplicarlo.
quarkus.smallrye-openapi.auto-add-security=false
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/q/swagger-ui
quarkus.swagger-ui.title=EduTrack Auth Service API

# TTLs de tokens
auth.jwt.access-token.expiry-seconds=900
auth.jwt.refresh-token.expiry-days=7

# Seed del admin inicial (sobreescribir en producción via env vars)
auth.seed.admin.email=${ADMIN_EMAIL:admin@edutrack.cl}
auth.seed.admin.password=${ADMIN_PASSWORD:changeme123!}
auth.seed.admin.display-name=${ADMIN_NAME:admin}