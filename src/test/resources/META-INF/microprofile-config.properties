# Config para los tests UNITARIOS (JUnit5 + Mockito), NO para @QuarkusTest.
#
# Estos tests no arrancan Quarkus (sin datasource, sin Flyway, sin Docker): se
# ejecutan en surefire como JUnit plano para que `./mvnw test` corra en cualquier
# entorno. SmallRye-Config (proveedor MP-Config en el classpath) lee este archivo
# como ConfigSource por defecto, de modo que el `Jwt....sign()` sin argumentos que
# usa TokenService encuentra la llave de firma RS256.
#
# La llave aqui es exclusiva de tests (committed en src/test/resources): NO es la
# de produccion, que vive en .certs/ fuera del control de versiones.
#
# config_ordinal=300 hace que esta fuente gane sobre application.properties
# (ordinal 250), que SmallRye-Config tambien lee del classpath y cuyo default
# (.certs/privateKey.pem) no existe en el entorno de test. El prefijo classpath:
# es el que entiende el ResourceUtils de SmallRye para cargar desde el classpath.
config_ordinal=300
smallrye.jwt.sign.key.location=classpath:privateKey.pem
smallrye.jwt.new-token.key-id=edutrack-auth-key-1
mp.jwt.verify.publickey.location=classpath:publicKey.pem
mp.jwt.issuer=edutrack-auth
