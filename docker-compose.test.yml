services:

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: edutrack
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_pass
    tmpfs:
      - /var/lib/postgresql/data   # DB efímera — solo para tests
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d edutrack"]
      interval: 5s
      timeout: 5s
      retries: 12

  tests:
    image: maven:3.9.9-eclipse-temurin-21
    working_dir: /workspace
    volumes:
      - .:/workspace
      - ${HOME}/.m2:/root/.m2     # cache local de dependencias Maven
    environment:
      # Apunta al servicio postgres de este compose
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://db:5432/edutrack
      QUARKUS_DATASOURCE_USERNAME: auth_user
      QUARKUS_DATASOURCE_PASSWORD: auth_pass
      # DevServices deshabilitado: usamos la DB explícita de arriba
      QUARKUS_DATASOURCE_DEVSERVICES_ENABLED: "false"
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "chmod +x ./mvnw && ./mvnw test -B"
